
deployment.yaml
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodejs-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nodejs-app
  template:
    metadata:
      labels:
        app: nodejs-app
    spec:
      imagePullSecrets:
        - name: gitlab-registry-secret
      containers:
        - name: nodejs-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          env:
            - name: IMAGE_NAME
              value: "IMAGE_PLACEHOLDER"            
---




service.yaml
---
apiVersion: v1
kind: Service
metadata:
  name: nodejs-service
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-scheme: internet-facing
    service.beta.kubernetes.io/aws-load-balancer-type: nlb
spec:
  selector:
    app: nodejs-app
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
---





















