✅ 03
public/index.html
---

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GitLab CI/CD App</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  font-family: Arial, sans-serif;
  color: white;
  text-align: center;
}

/* Main Title */
.title {
  font-size: 60px;
  font-weight: bold;
  background: linear-gradient(90deg, #ff7e5f, #feb47b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: glow 2s ease-in-out infinite alternate;
}

/* Glow animation */
@keyframes glow {
  from {
    text-shadow: 0 0 10px rgba(255,255,255,0.2);
  }
  to {
    text-shadow: 0 0 30px rgba(255,255,255,0.8);
  }
}

/* Branding */
.branding {
  margin-top: 15px;
  font-size: 18px;
  color: #ccc;
}

.branding strong {
  color: #00ffd5;
}

/* Subtitle */
.subtitle {
  margin-top: 25px;
  font-size: 20px;
  color: #ddd;
}

.image-name {
  color: #00ffd5;
  font-weight: bold;
}
</style>
</head>

<body>

<div>
  <!-- Title -->
  <div class="title">GitLab CI/CD Mastery</div>

  <!-- Branding -->
  <div class="branding">
    Powered by <strong>DolfinED</strong><br>
    Instructor: <strong>Mena Magdy Halem</strong>
  </div>

  <!-- Image Info -->
  <div class="subtitle">
    This app is running from image:
    <span class="image-name" id="imageName">Loading...</span>
  </div>
</div>

<script>
fetch("/api/image")
  .then(res => res.json())
  .then(data => {
    document.getElementById("imageName").innerText = data.image;
  });
</script>

</body>
</html>
